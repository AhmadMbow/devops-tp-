name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 : Build + tests
  # ---------------------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app # notre app vit dans le dossier app/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build --if-present

  # ---------------------------------------------------------------------------
  # Job 2 : Build + push de l'image Docker
  # Question 3 du TP : ne s'execute QUE si les tests passent (needs:) et
  # uniquement sur un push de la branche main (pas sur les pull requests).
  # ---------------------------------------------------------------------------
  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mon-app:latest

  # ---------------------------------------------------------------------------
  # Job 3 (Avance) : deploiement sur un serveur distant via SSH.
  # Ne s'execute qu'apres un push d'image reussi.
  # ---------------------------------------------------------------------------
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploiement via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/mon-app:latest
            docker stop mon-app || true
            docker rm mon-app || true
            docker run -d --name mon-app -p 80:3000 ${{ secrets.DOCKER_USERNAME }}/mon-app:latest
